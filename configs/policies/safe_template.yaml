name: turboquant_safe
enabled: true
comparison_label: safe
adapter:
  import_path: qwen35_turboquant_workflow_study.adapters.local_transformers_patch:LocalTransformersPatchAdapter
settings:
  backend_label: local_transformers_patch
  scope: full_attention_only
  profile: safe
  quant_mode: symmetric_per_token_fake_quant
  k_bits: 8
  v_bits: 8
notes:
  - Conservative local Transformers-side proxy for a full-attention-only compression policy.
  - This patches K/V projection outputs in the 8 full-attention layers only.
  - It is intended for workflow validation, not as a claim of true TurboQuant memory savings.
