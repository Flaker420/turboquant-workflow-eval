name: turboquant_workflow_eval_extended
model_config: ../model/qwen35_9b_text_only.yaml
prompt_pack:
  - ../../prompts/workflow_prompts.yaml
  - ../../prompts/generated_long_context.yaml
policy_configs:
  - ../policies/baseline.yaml
  - ../policies/safe_template.yaml
  - ../policies/aggressive_template.yaml
runtime:
  max_input_tokens: 4096
  max_new_tokens: 384
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  use_cache: true
  cleanup_between_policies: true
  repetitions: 3
  shuffle_policies: false
  shuffle_seed: 42
thresholds:
  latency_yellow_pct: 10
  latency_red_pct: 25
  similarity_yellow: 0.92
  similarity_red: 0.80
  output_length_yellow_pct: 15
  output_length_red_pct: 30
outputs:
  write_individual_text_files: true
  truncate_csv_output_to_chars: 180
