# Qwen3-8B KV cache compression config (dense, all layers uniform).
# Top-level fields are consumed directly by
# turboquant_core.adapters.workflow_eval.TurboQuantAdapter._extract_layout.

name: "Qwen/Qwen3-8B"

layout:
  num_layers: 36
  kv_heads: 8
  head_dim: 128

kv_cache:
  method: "turboquant_prod"
  bit_width: 4
  compressible_layers: 36       # all layers have KV cache
