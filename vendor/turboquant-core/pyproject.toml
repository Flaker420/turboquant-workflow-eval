[project]
name = "turboquant-core"
version = "0.1.0"
description = "TurboQuant algorithm library with model-specific KV cache backends"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
dependencies = [
    "torch>=2.5.0,<3.0",
    "transformers>=4.45.0,<4.60",
    "scipy>=1.14.0",
    "numpy>=1.26.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "ruff>=0.4.0"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
