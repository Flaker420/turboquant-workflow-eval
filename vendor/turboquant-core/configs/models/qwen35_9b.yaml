# Qwen3.5-9B KV cache compression config
# Probe-verified dimensions. Top-level fields are consumed directly by
# turboquant_core.adapters.workflow_eval.TurboQuantAdapter._extract_layout.

name: "Qwen/Qwen3.5-9B"

layout:
  num_layers: 32
  full_attention_interval: 4   # alias for full_attn_interval
  kv_heads: 4
  head_dim: 256                # probe-verified

# Informational only — not consumed by the adapter.
gated_attn_indices: [3, 7, 11, 15, 19, 23, 27, 31]

kv_cache:
  method: "turboquant_prod"
  bit_width: 4                 # 3-bit MSE + 1-bit QJL
  compressible_layers: 8       # only GatedAttn layers have KV cache
  # DeltaNet state is kernel-managed (opaque, not compressible)
